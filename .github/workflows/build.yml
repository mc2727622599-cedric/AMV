name: Build APK from zip

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FFMPEGKIT_AAR_URL: "https://github.com/NooruddinLakhani/ffmpeg-kit-full-gpl/releases/download/v1.0.0/ffmpeg-kit-full-gpl.aar"
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 解压工程压缩包
        run: |
          zipfile=$(ls AmvConverter*.zip 2>/dev/null | head -n1)
          if [ -z "$zipfile" ]; then zipfile=$(ls *.zip 2>/dev/null | head -n1); fi
          if [ -z "$zipfile" ]; then
            echo "::error::仓库里没找到工程压缩包(如 AmvConverter.zip)，请先上传它。"
            exit 1
          fi
          echo "解压：$zipfile"
          unzip -o "$zipfile" -d _extracted
          projdir=$(dirname "$(find _extracted -maxdepth 3 -name settings.gradle | head -n1)")
          echo "PROJ_DIR=$projdir" >> "$GITHUB_ENV"
          echo "工程目录：$projdir"
          ls -la "$projdir"

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 准备 FFmpegKit AAR（缺失则自动下载）
        working-directory: ${{ env.PROJ_DIR }}
        run: |
          shopt -s nullglob
          aars=(app/libs/*.aar)
          if [ ${#aars[@]} -gt 0 ]; then
            echo "已检测到 AAR：${aars[*]}"
          else
            mkdir -p app/libs
            curl -fL --retry 3 -o app/libs/ffmpeg-kit-full-gpl.aar "$FFMPEGKIT_AAR_URL"
            ls -la app/libs/
          fi

      - name: 准备 Gradle wrapper
        working-directory: ${{ env.PROJ_DIR }}
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: 编译 debug APK
        working-directory: ${{ env.PROJ_DIR }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: AmvConverter-debug-apk
          path: ${{ env.PROJ_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
